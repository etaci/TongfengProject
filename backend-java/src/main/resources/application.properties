spring.application.name=backend-java
server.port=8080
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB
spring.datasource.url=${DB_URL:jdbc:h2:file:./data/tongfeng;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.database=${REDIS_DATABASE:0}
spring.data.redis.repositories.enabled=false
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
app.ai-base-url=http://localhost:8001
app.storage-root=./storage
app.auth-token-days=30
app.redis-enabled=${REDIS_ENABLED:false}
app.session-cache-prefix=tongfeng:session:
app.scheduler-enabled=${SCHEDULER_ENABLED:true}
app.reminder-refresh-cron=${REMINDER_REFRESH_CRON:0 0/30 * * * *}
app.summary-refresh-cron=${SUMMARY_REFRESH_CRON:0 5 0 * * * *}
app.weather-live-enabled=${WEATHER_LIVE_ENABLED:true}
app.weather-geocoding-base-url=${WEATHER_GEOCODING_BASE_URL:https://geocoding-api.open-meteo.com}
app.weather-forecast-base-url=${WEATHER_FORECAST_BASE_URL:https://api.open-meteo.com}
app.family-enabled=${FEATURE_FAMILY_ENABLED:true}
